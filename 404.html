<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Vigil</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0a; color: #e4e4e7;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center;
    }
    .code { font-size: 96px; font-weight: 800; color: #ff6b2b; line-height: 1; }
    .msg { font-size: 16px; color: #8b8b92; margin: 16px 0 32px; }
    a {
      color: #ff6b2b; padding: 10px 24px; border: 1px solid rgba(255,107,43,0.3);
      border-radius: 8px; font-size: 14px; text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: rgba(255,107,43,0.1); }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <div class="msg">This page doesn't exist. The threat was a false positive.</div>
    <a href="/">Back to Vigil</a>
  </div>
</body>
</html>
